name: Review Bugs with Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]

jobs:
  review:
    name: Revision de bugs con Claude Code
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ejecutar revision de bugs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat .github/prompts/review-bugs.md)" \
            --allowedTools "Write,Read,Bash" \
            --output-format text > REPORTE-BUGS.md
        continue-on-error: true

      - name: Publicar reporte como comentario en el PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '## Revision de Bugs con Claude Code\n\n';

            if (fs.existsSync('REPORTE-BUGS.md')) {
              const reporte = fs.readFileSync('REPORTE-BUGS.md', 'utf8');
              // Limitar a 65000 caracteres para no exceder el limite de GitHub
              body += reporte.length > 65000
                ? reporte.substring(0, 65000) + '\n\n_[Reporte truncado — ver artefacto completo]_'
                : reporte;
            } else {
              body += '_No se pudo generar el reporte. Verificar los logs del workflow._';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Subir reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-bugs
          path: REPORTE-BUGS.md
          retention-days: 30